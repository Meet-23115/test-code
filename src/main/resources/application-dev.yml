spring:
  datasource:
    url: jdbc:h2:mem:enterprisedb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        globally_quoted_identifiers: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
